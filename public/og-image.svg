<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  role="img"
  aria-label="Vi Chí Công  Senior Fullstack Developer"
>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#060D1F" />
      <stop offset="55%" stop-color="#0B1A33" />
      <stop offset="100%" stop-color="#060D1F" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#F2C84A" stop-opacity="0.22" />
      <stop offset="65%" stop-color="#F2C84A" stop-opacity="0.02" />
      <stop offset="100%" stop-color="#F2C84A" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <g transform="translate(88 110)">
    <text
      x="0"
      y="0"
      fill="#FFFAEE"
      font-family="Montserrat, Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
      font-size="64"
      font-weight="800"
      letter-spacing="1"
    >
      Vi Chí Công
    </text>

    <text
      x="0"
      y="72"
      fill="#F2C84A"
      font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
      font-size="28"
      font-weight="600"
      letter-spacing="2"
    >
      Senior Fullstack Developer · HCMC
    </text>

    <text
      x="0"
      y="136"
      fill="rgba(220,200,160,0.85)"
      font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, \"Liberation Mono\", \"Courier New\", monospace"
      font-size="24"
      font-weight="600"
      letter-spacing="0.5"
    >
      .NET Core · Spring Boot · DDD · CQRS · Payment Integration
    </text>

    <g transform="translate(0 192)">
      <rect x="0" y="0" width="560" height="2" fill="rgba(242,200,74,0.45)" />
      <rect x="0" y="14" width="380" height="1" fill="rgba(242,200,74,0.22)" />
    </g>

    <text
      x="0"
      y="276"
      fill="rgba(220,200,160,0.65)"
      font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif"
      font-size="22"
      font-weight="500"
    >
      victorvu-my-portfolio.info
    </text>
  </g>
</svg>

